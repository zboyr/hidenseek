mode: classification

par3:
  min_translations: 3
  min_length: 100
  max_texts: 150            # need 2 per trial × 50 trials

embedding_validation:
  enabled: false

num_trials: 50
warmup_steps: 0
auditor_as_detective: false
auditor_no_history: true

auditor:
  type: openrouter
  model_id: anthropic/claude-sonnet-4.6

detective:
  type: openrouter
  model_id: anthropic/claude-sonnet-4.6

paraphrasers:
  - id: human_par3
    type: preloaded
  - id: sonnet_46
    type: openrouter
    model_id: anthropic/claude-sonnet-4.6
  - id: gemini_25_pro
    type: openrouter
    model_id: google/gemini-2.5-pro
  - id: gpt_54
    type: openrouter
    model_id: openai/gpt-5.4
