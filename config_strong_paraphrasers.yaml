par3:
  min_translations: 3
  min_length: 100
  max_texts: 100

embedding_validation:
  threshold: 0.75
  model: gemini-embedding-001

num_trials: 10
warmup_steps: 1
auditor_as_detective: false
auditor_no_history: true

auditor:
  type: openrouter
  model_id: anthropic/claude-sonnet-4.6

detective:
  type: openrouter
  model_id: anthropic/claude-sonnet-4.6

paraphrasers:
  - id: human_par3
    type: preloaded
  - id: sonnet_46
    type: openrouter
    model_id: anthropic/claude-sonnet-4.6
  - id: gemini_25_pro
    type: openrouter
    model_id: google/gemini-2.5-pro
  - id: gpt_54
    type: openrouter
    model_id: openai/gpt-5.4
