auditor_model: openai/gpt-5.2
detective_model: logreg_charwb
output_with_timestamp: true
run_tag: full
random_seed: 7
rounds: 5
samples_per_round: 4
temperature: 0.7
length_tolerance_percent: 15
test_size: 0.2
max_workers: 3
rate_limit_seconds: 0.0
output_path: reports/paraphraser_fingerprint
source_text_path: paraphraser_source_texts.txt

style_constraints:
  - neutral tone
  - formal register
  - concise prose
  - explanatory narrative

syntax_constraints:
  - vary sentence openings
  - prefer active voice
  - avoid bullet lists
  - mix simple and compound sentences

paraphrasers:
  - id: claude_haiku_45
    type: openrouter
    model_id: anthropic/claude-haiku-4.5

  - id: llama_31_8b
    type: openrouter
    model_id: meta-llama/llama-3.1-8b-instruct

  - id: gemini_25_flash
    type: openrouter
    model_id: google/gemini-2.5-flash

  - id: gpt5_nano
    type: openrouter
    model_id: openai/gpt-5-nano

  - id: dipper_lowlow
    type: dipper_remote_true
    endpoint_url_env: HF_DIPPER_ENDPOINT_URL
    api_key_env: HF_DIPPER_API_KEY
    lex_div: 20
    order_div: 20

  - id: dipper_lowmed
    type: dipper_remote_true
    endpoint_url_env: HF_DIPPER_ENDPOINT_URL
    api_key_env: HF_DIPPER_API_KEY
    lex_div: 20
    order_div: 40

  - id: dipper_medhigh
    type: dipper_remote_true
    endpoint_url_env: HF_DIPPER_ENDPOINT_URL
    api_key_env: HF_DIPPER_API_KEY
    lex_div: 40
    order_div: 60

  - id: dipper_highhigh
    type: dipper_remote_true
    endpoint_url_env: HF_DIPPER_ENDPOINT_URL
    api_key_env: HF_DIPPER_API_KEY
    lex_div: 60
    order_div: 60
